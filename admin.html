<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Danwilhs</title>

<style>
  body {
    background: #0b0b0b;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 800px;
    margin: auto;
  }

  h2, h3 {
    text-align: center;
    color: gold;
  }

  form {
    margin-top: 20px;
  }

  input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  .btn {
    background: gold;
    color: #000;
    padding: 12px;
    border: none;
    width: 100%;
    cursor: pointer;
    border-radius: 8px;
    font-weight: bold;
  }

  .btn:hover {
    opacity: 0.9;
  }

  #preview {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
    display: none;
  }

  #productList div {
    background: #111;
    padding: 10px;
    border-radius: 10px;
  }

  hr {
    border: none;
    height: 1px;
    background: #222;
    margin: 40px 0;
  }
</style>
</head>

<body>

<div class="container">

  <h2>Admin Panel</h2>

  <!-- ================= ADD PRODUCT ================= -->
  <form id="productForm">

    <input type="text" id="name" placeholder="Product Name" required>

    <input type="number" id="price" placeholder="Price (GHS)" required>

    <select id="brand" required>
      <option value="">Select Brand</option>
      <option>Lattafa</option>
      <option>Armaf</option>
      <option>Maison Yusif</option>
      <option>Scent of Africa</option>
      <option>Fragrance World</option>
      <option>Creed</option>
      <option>Tom Ford</option>
      <option>Carolina Herrera</option>
    </select>

    <input type="text" id="image" placeholder="Image URL" required>

    <!-- IMAGE PREVIEW -->
    <img id="preview">

    <button class="btn" type="submit">Add Product</button>

  </form>

  <hr>

  <!-- ================= PRODUCT LIST ================= -->
  <h3>Existing Products</h3>
  <div id="productList"></div>

  <button onclick="logout()" class="btn">Logout</button>
</div>

</script>

<script type="module" src="js/admin-auth.js"></script>
<script type="module" src="js/admin.js"></script>


</body>
</html>
