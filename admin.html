<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Upload Product</title>

<link rel="stylesheet" href="css/style.css">

<style>
/* Simple clean admin UI */
.admin-container {
  max-width: 500px;
  margin: 80px auto;
  padding: 30px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.admin-container h2 {
  margin-bottom: 20px;
}

.admin-container input,
.admin-container select {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

.admin-container label {
  font-size: 14px;
  margin-bottom: 5px;
  display: block;
}

.admin-container button {
  width: 100%;
  padding: 14px;
  background: #c9a96e;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.preview {
  margin-top: 20px;
}

.preview img,
.preview video {
  width: 100%;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="admin-container">
  <h2>Upload Product</h2>

  <form id="productForm">

    <label>Product Name</label>
    <input type="text" id="name" required>

    <label>Price (GHS)</label>
    <input type="number" id="price" required>

    <label>Brand</label>
    <input type="text" id="brand" required>

    <label>Image URL</label>
    <input type="text" id="image" required>

    <label>Video Preview URL (optional)</label>
    <input type="text" id="video">

    <label>
      <input type="checkbox" id="trending">
      Mark as Trending
    </label>

    <button type="submit">Upload Product</button>

  </form>

  <div class="preview" id="preview"></div>


  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
  <h2>Upload Product</h2>

  <button onclick="logout()" style="
    background:#111;
    color:#fff;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
  ">
    Logout
  </button>
</div>

</div>

<script type="module" src="js/admin-auth.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "danwilhs-store.firebaseapp.com",
  projectId: "danwilhs-store",
};

import { getApp, getApps, initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("productForm");
const preview = document.getElementById("preview");

// 🔍 LIVE PREVIEW (Premium touch)
form.addEventListener("input", () => {
  const image = document.getElementById("image").value;
  const video = document.getElementById("video").value;

  preview.innerHTML = `
    ${image ? `<img src="${image}">` : ""}
    ${video ? `
      <video autoplay muted loop playsinline>
        <source src="${video}">
      </video>
    ` : ""}
  `;
});

// 🚀 SUBMIT TO FIRESTORE
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const product = {
    name: document.getElementById("name").value,
    price: Number(document.getElementById("price").value),
    brand: document.getElementById("brand").value,
    image: document.getElementById("image").value,
    video: document.getElementById("video").value || null,
    trending: document.getElementById("trending").checked
  };

  try {
    await addDoc(collection(db, "products"), product);

    alert("✅ Product uploaded successfully");

    form.reset();
    preview.innerHTML = "";

  } catch (err) {
    console.error(err);
    alert("❌ Upload failed");
  }
});
</script>

</body>
</html>
