<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | Dan Willhs</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- ================= NAV ================= -->
<header class="nav">
  <h1 class="logo">Dan Willhs</h1>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <nav id="navLinks">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>


<!-- ================= PRODUCT ================= -->
<section class="section">
  <div id="product">Loading product...</div>
</section>

<div class="floating-cart" onclick="goToCart()">
  🛒 <span id="cartCount">0</span>
</div>

<div id="toast" class="toast"></div>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCVLoGB4S25-HSHx_HCtltGs1u_-U4n9lE",
  authDomain: "danwilhs-store.firebaseapp.com",
  projectId: "danwilhs-store",
  storageBucket: "danwilhs-store.firebasestorage.app",
  messagingSenderId: "486741086200",
  appId: "1:486741086200:web:aa764d7bb19dd2af7a500d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= LOAD PRODUCT =================
const id = new URLSearchParams(window.location.search).get("id");

async function loadProduct() {
  const el = document.getElementById("product");

  if (!id) {
    el.innerHTML = "<p>Invalid product</p>";
    return;
  }

  try {
    const docRef = doc(db, "products", id);
    const snap = await getDoc(docRef);

    if (!snap.exists()) {
      el.innerHTML = "<p>Product not found</p>";
      return;
    }

    const p = { id: snap.id, ...snap.data() };

    renderProduct(p);
    loadRelated(p);

  } catch (err) {
    console.error(err);
    el.innerHTML = "<p>Error loading product</p>";
  }
}

// ================= RENDER PRODUCT =================
function renderProduct(p) {

  window.currentProduct = p;

  document.getElementById("product").innerHTML = `
  <div class="product-elite">

    <div class="product-media">
      <div class="media-box">
        <img src="${p.image}" class="main-img">

        ${p.video ? `
          <video class="hover-video" muted loop playsinline>
            <source src="${p.video}" type="video/mp4">
          </video>
        ` : ""}
      </div>
    </div>

    <div class="product-info">

      <p class="brand">${p.brand || "Luxury Collection"}</p>
      <h1>${p.name}</h1>

      <div class="price-row">
        <span class="price">GHS ${p.price}</span>
      </div>

      <p class="stock">✔ Single purchase</p>
      <p class="stock">✔ In stock</p>


      <div class="product-actions">
        <button class="btn gold add-cart-btn"
          data-product='${encodeURIComponent(JSON.stringify(p))}'>
          Add to Cart
        </button>

        <button class="btn outline whatsapp-btn">
          Buy via WhatsApp
        </button>
      </div>

    </div>

  </div>

  <div id="relatedProducts" class="grid"></div>
  `;

  // ✅ Attach AFTER render
document.querySelectorAll(".add-cart-btn").forEach(btn => {
  btn.addEventListener("click", (e) => {
    e.stopPropagation();

    const product = JSON.parse(
      decodeURIComponent(btn.dataset.product)
    );

    window.addToCart({
      ...product,
      qty: qty
    });
  });
});

document.querySelectorAll(".whatsapp-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    buyNow(window.currentProduct);
  });
});

  qty = 1;

  initMediaHover();
}



function initMediaHover() {
  const box = document.querySelector(".media-box");
  const video = document.querySelector(".hover-video");

  if (!video) return;

  box.addEventListener("mouseenter", () => {
    video.style.opacity = 1;
    video.play();
  });

  box.addEventListener("mouseleave", () => {
    video.pause();
    video.currentTime = 0;
    video.style.opacity = 0;
  });
}

let qty = 1;

function changeQty(amount) {
  qty += amount;

  if (qty < 1) qty = 1;

  document.getElementById("qty").innerText = qty;
}

function buyNow(product) {
  const phone = "233249144616";

  const message =
    `Hello Danwilhs Fragrance Hub,%0A%0A` +
    `I want to order:%0A` +
    `${product.name}%0A` +
    `Quantity: ${qty}%0A` +
    `Total: GHS ${product.price * qty}`;

  window.open(`https://wa.me/${phone}?text=${message}`, "_blank");
}

// ================= RELATED PRODUCTS =================
async function loadRelated(current) {

  const snap = await getDocs(collection(db, "products"));

  let related = [];

  snap.forEach(doc => {
    const p = { id: doc.id, ...doc.data() };

    if (
  p.id !== current.id &&
  (p.brand === current.brand || p.category === current.category)
)  {
      related.push(p);
    }
  });

  related = related.slice(0, 4);

  document.getElementById("relatedProducts").innerHTML =
  related.map(p => `
    <div class="card">

      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p class="price">GHS ${p.price}</p>

      <div class="card-actions">
        <a href="product.html?id=${p.id}" class="btn">View</a>
      </div>

    </div>
  `).join("");
}

// ================= INIT =================
loadProduct();
updateCartCount();
</script>

<!-- ================= GLOBAL SCRIPTS ================= -->
<script src="js/cart.js"></script>
<script type="module" src="js/app.js"></script>

<script>
function goToCart(){
  window.location.href = "cart.html";
}

window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});
</script>

</body>
</html>
