<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart | Dan Willhs</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="nav">

  <h1 class="logo">Dan Willhs</h1>

  <!-- HAMBURGER -->
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <!-- NAV LINKS -->
  <nav id="navLinks">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="cart.html">Cart</a>
  </nav>

  <!-- SEARCH (optional for all pages) -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search perfumes...">
  </div>

</header>

<section class="section cart">

  <h2>Your Cart</h2>

  <div id="cartItems"></div>
  <h3 id="total" class="total"></h3>

  <a href="checkout.html" id="checkoutBtn" class="btn">Checkout</a>

</section>

<div class="floating-cart" onclick="goToCart()">
  🛒 <span id="cartCount">0</span>
</div>

<div id="toast" class="toast"></div>


<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/app.js"></script>
<script>
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});
</script>

</body>
</html>
