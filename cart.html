<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart | Dan Willhs</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="nav">

  <h1 class="logo">Dan Willhs</h1>

  <!-- HAMBURGER -->
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <!-- NAV LINKS -->
  <nav id="navLinks">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="cart.html">Cart</a>
  </nav>

</header>

<section class="section cart premium-cart">

  <h2>Your Cart</h2>

  <!-- EMPTY STATE -->
  <div id="emptyCart" class="empty-cart" style="display:none;">
    <i class="fas fa-shopping-bag"></i>
    <p>Your cart is empty</p>
    <a href="shop.html" class="btn">Start Shopping</a>
  </div>

  <!-- CART ITEMS -->
  <div id="cartItems" class="cart-items"></div>

  <!-- SUMMARY -->
  <div class="cart-summary">

    <div class="summary-row">
      <span>Subtotal</span>
      <span id="total">GHS 0</span>
    </div>

    <div class="summary-row highlight">
      <span>Total</span>
      <span id="grandTotal">GHS 0</span>
    </div>

    <button onclick="payWithWhatsApp(this)" class="btn gold checkout-btn">
      Order via WhatsApp
    </button>

    <p class="trust-note">
  ✔ Fast delivery • ✔ Pay on delivery • ✔ 100% Authentic
</p>

    <a href="shop.html" class="continue">
      ← Continue Shopping
    </a>

  </div>

</section>

<!-- FLOATING CART -->
<div class="floating-cart" onclick="goToCart()">
  🛒 <span id="cartCount">0</span>
</div>

<div id="toast" class="toast"></div>

<!-- SUCCESS POPUP -->
<div id="successPopup" class="success-popup">
  <div class="success-box">
    <h3>✅ Order Sent!</h3>
    <p>Opening WhatsApp to complete your order...</p>
    <button onclick="closeSuccess()">Close</button>
  </div>
</div>

<!-- ================= SCRIPTS ================= -->

<script src="js/cart.js"></script>
<script type="module" src="js/app.js"></script>

<!-- ✅ MINI NAV FIX (since no app.js here) -->
<script>
function toggleMenu() {
  const nav = document.getElementById("navLinks");
  nav.classList.toggle("show");
}

function goToCart(){
  window.location.href = "cart.html";
}
</script>

<script>
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});
</script>

</body>
</html>
