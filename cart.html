<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart | Dan Willhs</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="nav">

  <h1 class="logo">Dan Willhs</h1>

  <!-- HAMBURGER -->
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <!-- NAV LINKS -->
  <nav id="navLinks">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="cart.html">Cart</a>
  </nav>

</header>

<section class="section cart">

  <h2>Your Cart</h2>

  <div id="cartItems"></div>
  <h3 id="total" class="total"></h3>
  <a href="checkout.html" id="checkoutBtn" class="btn">Checkout</a>
</section>

<!-- FLOATING CART -->
<div class="floating-cart" onclick="goToCart()">
  🛒 <span id="cartCount">0</span>
</div>

<div id="toast" class="toast"></div>

<!-- SUCCESS POPUP -->
<div id="successPopup" class="success-popup">
  <div class="success-box">
    <h3>✅ Order Sent!</h3>
    <p>Redirecting you to WhatsApp...</p>
    <button onclick="closeSuccess()">Close</button>
  </div>
</div>

<!-- ================= SCRIPTS ================= -->

<script src="js/cart.js"></script>
<script type="module" src="js/app.js"></script>

<!-- ✅ MINI NAV FIX (since no app.js here) -->
<script>
function toggleMenu() {
  const nav = document.getElementById("navLinks");
  nav.classList.toggle("show");
}

function goToCart(){
  window.location.href = "cart.html";
}
</script>

<script>
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});
</script>

</body>
</html>
